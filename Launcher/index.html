<!doctypehtml>
    <html lang=en>
    <meta charset=UTF-8>
    <meta content="width=device-width,initial-scale=1" name=viewport>
    <title>EntropyX Launcher</title>
    <script src=https://cdn.tailwindcss.com></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Istok+Web:wght@700&display=swap"
        rel=stylesheet>
    <style>
        body {
            font-family: Inter, sans-serif;
            background-color: #0e0e0e;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        .entropy-wordmark {
            font-family: 'Istok Web', sans-serif;
            font-weight: 700;
            letter-spacing: .25em
        }

        .custom-scroll::-webkit-scrollbar {
            width: 3px
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: 0 0
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: #7c3aed;
            border-radius: 3px
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes logoSpin {
            from {
                transform: rotate(0)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @keyframes logoPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 12px rgba(167, 139, 250, .3))
            }

            50% {
                filter: drop-shadow(0 0 28px rgba(167, 139, 250, .6))
            }
        }

        @keyframes glowPulse {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(124, 58, 237, .3), inset 0 0 20px rgba(124, 58, 237, .05)
            }

            50% {
                box-shadow: 0 0 40px rgba(124, 58, 237, .5), inset 0 0 30px rgba(124, 58, 237, .08)
            }
        }

        @keyframes glowPulseHover {

            0%,
            100% {
                box-shadow: 0 0 45px rgba(124, 58, 237, .65), 0 0 80px rgba(124, 58, 237, .25), inset 0 0 30px rgba(124, 58, 237, .1)
            }

            50% {
                box-shadow: 0 0 65px rgba(124, 58, 237, .85), 0 0 110px rgba(124, 58, 237, .35), inset 0 0 40px rgba(124, 58, 237, .15)
            }
        }

        @keyframes borderGlow {

            0%,
            100% {
                border-color: rgba(124, 58, 237, .2)
            }

            50% {
                border-color: rgba(124, 58, 237, .5)
            }
        }

        .anim-fade {
            animation: fadeIn .6s ease-out forwards;
            opacity: 0
        }

        .anim-slide {
            animation: slideUp .7s ease-out forwards;
            opacity: 0
        }

        .d1 {
            animation-delay: .1s
        }

        .d2 {
            animation-delay: .2s
        }

        .d3 {
            animation-delay: .35s
        }

        .d4 {
            animation-delay: .5s
        }

        .d5 {
            animation-delay: .65s
        }

        .d6 {
            animation-delay: .8s
        }

        .logo-idle {
            animation: logoPulse 3s ease-in-out infinite
        }

        .logo-idle:hover {
            animation: logoSpin .8s ease-in-out, logoPulse 3s ease-in-out infinite
        }

        .launch-glow {
            animation: glowPulse 2.5s ease-in-out infinite
        }

        .launch-glow:hover {
            animation: glowPulseHover 1.6s ease-in-out infinite
        }

        .card-border {
            animation: borderGlow 3s ease-in-out infinite
        }

        .tab-btn {
            position: relative
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            transition: all .3s;
            transform: translateX(-50%);
            border-radius: 1px
        }

        .tab-btn.active::after {
            width: 100%
        }

        .tab-btn.active {
            color: #a78bfa
        }

        .tab-content {
            display: none
        }

        .tab-content.active {
            display: block
        }

        .noise::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            opacity: .015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none
        }
    </style>
    <div class="flex flex-col bg-[#111113] border border-[#1f1f24] h-[620px] noise overflow-hidden relative rounded-[20px] shadow-2xl w-[900px]"
        id=launcher>
        <div class="flex items-center anim-fade pb-2 px-6 d1 justify-between pt-5"><span
                class="uppercase font-medium text-[#444] text-[10px] tracking-widest">Welcome back</span>
            <div class="flex items-center gap-3"><button
                    class="text-[#555] transition-colors duration-200 hover:text-red-400" id=closeBtn><svg height=16
                        viewBox="0 0 24 24" width=16 fill=none stroke=currentColor stroke-linecap=round
                        stroke-linejoin=round stroke-width=2>
                        <line x1=18 x2=6 y1=6 y2=18 />
                        <line x1=6 x2=18 y1=6 y2=18 />
                    </svg></button></div>
        </div>
        <div class="flex items-center pt-4 anim-slide d2 flex-col justify-center pb-6">
            <div class="cursor-pointer logo-idle mb-4"><svg height=72 viewBox="-100 -100 200 200" width=72
                    xmlns=http://www.w3.org/2000/svg>
                    <g fill=white>
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(45) />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(90) />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(135) />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(180) />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(225) />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(270) />
                        <path d="M 0,-95 L 12,-70 L 4,-70 L 4,0 L -4,0 L -4,-70 L -12,-70 Z" transform=rotate(315) />
                    </g>
                </svg></div>
            <div class="flex items-center gap-3 mb-5"><span
                    class="text-white entropy-wordmark leading-none text-3xl">ENTROPYX</span> <span
                    class="uppercase bg-[#7c3aed] font-bold px-2 py-0.5 rounded-full text-[9px] text-white tracking-wider">Beta</span>
            </div><button
                class="text-white active:scale-[0.97] bg-gradient-to-r duration-300 font-semibold from-[#7c3aed] hover:from-[#6d28d9] hover:to-[#5b21b6] launch-glow px-16 py-3 rounded-xl text-sm to-[#6d28d9] tracking-wide transition-all"
                id=launchBtn>LAUNCH</button>
            <div class="flex items-center gap-4 mt-4 text-[#444] text-[10px]"><span
                    class="flex items-center gap-1.5"><span class="h-1.5 bg-[#7c3aed] rounded-full w-1.5"></span>Entropy
                    Beta</span> <span class=text-[#2a2a2a]>|</span><span>EaglerCraft 1.8.8</span> <span
                    class=text-[#2a2a2a]>|</span><span>WASM-GC</span></div>
        </div>
        <div class="anim-fade bg-gradient-to-r d3 from-transparent h-px mx-6 to-transparent via-[#2a2a2e]"></div>
        <div class="flex items-center anim-fade pb-2 px-6 d4 gap-6 pt-4"><button
                class="text-xs font-medium tab-btn tracking-wide transition-colors uppercase active text-[#a78bfa]"
                data-tab=news>News</button> <button
                class="text-[#555] text-xs font-medium hover:text-[#888] tab-btn tracking-wide transition-colors uppercase"
                data-tab=changelog>Changelog</button></div>
        <div class="anim-slide d5 flex-1 overflow-hidden pb-5 px-6">
            <div class="h-full tab-content active" id=tab-news>
                <div class="gap-3 grid grid-cols-4" id=newsContainer>
                    <p class="text-[#555] text-xs">Loading news from GitHub...
                </div>
            </div>
            <div class="h-full tab-content custom-scroll overflow-y-auto pr-2" id=tab-changelog>
                <div class="pt-1 space-y-2" id=changelogContainer>
                    <p class="text-[#555] text-xs">Loading changelog from GitHub...
                </div>
            </div>
        </div>
    </div>
    <script>const REPO_BASE = "https://raw.githubusercontent.com/Silentsmi1e/EntropyX/refs/heads/main/";
        const CLIENT_URL = "https://raw.githubusercontent.com/Silentsmi1e/EntropyX/refs/heads/main/EntropyX_1.8_WASM-GC_Offline_Download.html";

        // Tab Switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
            });
        });

        // Fetch Data from GitHub
        async function fetchRepoData() {
            try {
                // Fetch News
                fetch(REPO_BASE + 'news.json')
                    .then(res => {
                        if (!res.ok) throw new Error("News file not found");
                        return res.json();
                    })
                    .then(data => {
                        const container = document.getElementById('newsContainer');
                        container.innerHTML = '';
                        data.slice(0, 4).forEach((item, index) => {
                            container.innerHTML += `
                            <div class="card-border bg-[#16161a] rounded-xl border border-[#7c3aed]/20 p-4 flex flex-col group hover:bg-[#1a1a20] transition-colors duration-300 cursor-pointer" style="animation-delay: ${(index * 0.5) + 3}s;">
                                <div class="w-8 h-8 rounded-lg bg-[#7c3aed]/10 flex items-center justify-center mb-3 shrink-0">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                                    </svg>
                                </div>
                                <h3 class="text-white text-sm font-semibold mb-1.5 group-hover:text-[#a78bfa] transition-colors">${item.title}</h3>
                                <p class="text-[#555] text-[11px] leading-relaxed mb-4">${item.description}</p>
                                <div class="mt-auto">
                                    <span class="text-[#444] text-[9px] font-mono">${item.date}</span>
                                </div>
                            </div>`;
                        });
                    }).catch(() => document.getElementById('newsContainer').innerHTML = '<p class="text-red-400 text-xs">Failed to load news. Ensure news.json is public on GitHub.</p>');

                // Fetch Changelog
                fetch(REPO_BASE + 'changelog.txt')
                    .then(res => {
                        if (!res.ok) throw new Error("Changelog file not found");
                        return res.text();
                    })
                    .then(text => {
                        const container = document.getElementById('changelogContainer');
                        container.innerHTML = '';
                        const lines = text.split('\n');
                        let currentGroup = null;
                        let currentItems = '';

                        lines.forEach(line => {
                            line = line.trim();
                            if (!line) return;

                            if (/^\d/.test(line)) { // Starts with number = date
                                if (currentGroup) {
                                    container.innerHTML += `<div class="flex items-start gap-3 py-2"><span class="text-[9px] text-[#444] w-20 shrink-0 pt-0.5 font-mono">${currentGroup}</span><div class="flex-1 space-y-1.5">${currentItems}</div></div>`;
                                    currentItems = '';
                                }
                                currentGroup = line;
                            } else if (currentGroup) {
                                const symbol = line.charAt(0);
                                let color = "text-[#a78bfa]";
                                if (symbol === '~') color = "text-green-500";
                                if (symbol === '*') color = "text-yellow-500";
                                currentItems += `<div class="flex gap-2 text-xs"><span class="${color} font-bold">${symbol}</span><span class="text-[#888]">${line.substring(1).trim()}</span></div>`;
                            }
                        });

                        if (currentGroup) {
                            container.innerHTML += `<div class="flex items-start gap-3 py-2"><span class="text-[9px] text-[#444] w-20 shrink-0 pt-0.5 font-mono">${currentGroup}</span><div class="flex-1 space-y-1.5">${currentItems}</div></div>`;
                        }
                    }).catch(() => document.getElementById('changelogContainer').innerHTML = '<p class="text-red-400 text-xs">Failed to load changelog. Ensure changelog.txt is public on GitHub.</p>');
            } catch (e) { console.error(e); }
        }
        fetchRepoData();

        // INJECT RAW HTML TO RENDER IT
        document.getElementById('launchBtn').addEventListener('click', async () => {
            const btn = document.getElementById('launchBtn');

            btn.textContent = "FETCHING...";
            try {
                const response = await fetch(CLIENT_URL);
                if (!response.ok) throw new Error("Client file not found");
                const htmlContent = await response.text();

                const win = window.open('about:blank', '_blank');
                if (win) {
                    win.document.open();
                    win.document.write(htmlContent);
                    win.document.close();
                } else {
                    alert("Please allow pop-ups to launch the client.");
                }
            } catch (err) {
                alert("Failed to fetch the client. Make sure the URL is correct and public.");
            }
            btn.textContent = "LAUNCH";
        });

        // Close logic
        const closeBtn = document.getElementById('closeBtn');
        if (closeBtn) closeBtn.addEventListener('click', () => window.close());</script>
